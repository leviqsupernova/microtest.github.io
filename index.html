<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Diagnostics</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #080c10;
    --surface: #0e1419;
    --border: #1c2a38;
    --text: #c8d8e8;
    --muted: #4a6070;
    --accent: #00b4d8;
    --pass: #00e676;
    --fail: #ff3d6b;
    --pending: #ffab00;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    padding: 16px;
    font-size: 13px;
    line-height: 1.5;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 14px;
    margin-bottom: 20px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }

  header h1 {
    font-family: var(--display);
    font-weight: 800;
    font-size: 20px;
    color: #fff;
    letter-spacing: -0.5px;
  }

  header span {
    color: var(--muted);
    font-size: 11px;
  }

  .section-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 22px;
  }

  .check-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .check-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }

  .check-row.pass  { border-left: 3px solid var(--pass); }
  .check-row.fail  { border-left: 3px solid var(--fail); }
  .check-row.running { border-left: 3px solid var(--pending); }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .pass  .dot { background: var(--pass);  box-shadow: 0 0 8px var(--pass); }
  .fail  .dot { background: var(--fail);  box-shadow: 0 0 8px var(--fail); }
  .running .dot { background: var(--pending); animation: blink 0.8s infinite; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .check-name { flex: 1; color: #fff; }
  .check-status { font-size: 11px; }
  .pass  .check-status { color: var(--pass); }
  .fail  .check-status { color: var(--fail); }
  .running .check-status { color: var(--pending); }

  /* Buttons */
  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 13px 10px;
    cursor: pointer;
    text-align: center;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .btn:active { background: #131e28; }
  .btn:hover { border-color: var(--accent); color: #fff; }

  .btn svg { flex-shrink: 0; }

  .btn.accent {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn.google-btn {
    grid-column: span 2;
    border-color: #4285F4;
    color: #fff;
    background: #1a2233;
    gap: 10px;
    font-size: 13px;
    padding: 14px;
  }
  .btn.google-btn:hover { background: #1e2b42; }

  /* Camera preview */
  #camera-section {
    margin-top: 0;
  }

  #video-wrap {
    display: none;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 10px;
    position: relative;
  }

  #video-wrap video {
    width: 100%;
    max-height: 280px;
    object-fit: cover;
    display: block;
  }

  #video-close {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    width: 30px; height: 30px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono);
  }

  #cam-label {
    position: absolute;
    bottom: 8px; left: 10px;
    background: rgba(0,0,0,0.6);
    padding: 3px 8px;
    border-radius: 4px;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  /* File section */
  #file-input { display: none; }

  #file-info {
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    color: var(--muted);
    display: none;
  }

  #file-info.visible { display: block; }
  #file-info .fname { color: var(--accent); font-size: 12px; }

  /* Google sign-in result */
  #g-result {
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 11px;
    color: var(--muted);
    display: none;
  }
  #g-result.visible { display: block; }
  #g-result .gname { color: var(--pass); font-size: 13px; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 22px 0;
  }
</style>
</head>
<body>

<header>
  <h1>BROWSER DIAG</h1>
  <span id="ua-short">detecting…</span>
</header>

<!-- CONNECTIVITY & CAPABILITY CHECKS -->
<div class="section-label">Connectivity &amp; Capability</div>
<div class="check-list">

  <div class="check-row running" id="row-http">
    <div class="dot"></div>
    <span class="check-name">HTTP Connection</span>
    <span class="check-status" id="st-http">checking…</span>
  </div>

  <div class="check-row running" id="row-js">
    <div class="dot"></div>
    <span class="check-name">JavaScript</span>
    <span class="check-status" id="st-js">checking…</span>
  </div>

  <div class="check-row running" id="row-cookie">
    <div class="dot"></div>
    <span class="check-name">1st-party Cookies</span>
    <span class="check-status" id="st-cookie">checking…</span>
  </div>

  <div class="check-row running" id="row-3p">
    <div class="dot"></div>
    <span class="check-name">3rd-party Cookies</span>
    <span class="check-status" id="st-3p">checking…</span>
  </div>

</div>

<hr class="divider">

<!-- CAMERA -->
<div class="section-label" id="camera-section">Camera</div>
<div class="btn-grid">
  <button class="btn accent" onclick="startCamera('user')">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M9 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2h-4l-1.5-2h-5L9 3z"/></svg>
    Selfie Cam
  </button>
  <button class="btn accent" onclick="startCamera('environment')">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M9 3H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2h-4l-1.5-2h-5L9 3z"/></svg>
    Back Cam
  </button>
</div>

<div id="video-wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="cam-label">LIVE</div>
  <button id="video-close" onclick="stopCamera()">✕</button>
</div>

<hr class="divider">

<!-- FILE -->
<div class="section-label">File Transfer</div>
<div class="btn-grid">
  <button class="btn" onclick="document.getElementById('file-input').click()">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Upload File
  </button>
  <button class="btn" id="dl-btn" onclick="downloadFile()" disabled style="opacity:.4">
    <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download
  </button>
</div>
<input type="file" id="file-input" onchange="onFileChosen(event)">
<div id="file-info"></div>

<hr class="divider">

<!-- GOOGLE -->
<div class="section-label">Authentication</div>
<div class="btn-grid">
  <button class="btn google-btn" onclick="triggerGoogle()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.36-8.16 2.36-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </button>
</div>
<div id="g-result"></div>

<!-- hidden Google One Tap container -->
<div id="g_id_onload"
  data-client_id="YOUR_GOOGLE_CLIENT_ID"
  data-callback="onGoogleSignIn"
  data-auto_prompt="false">
</div>

<br>

<script>
/* ── UA ─────────────────────────────────────────────────────── */
(function(){
  const ua = navigator.userAgent;
  const isChrome = /Chrome\/(\d+)/.exec(ua);
  document.getElementById('ua-short').textContent =
    isChrome ? `Chrome ${isChrome[1]} · Android` : ua.slice(0,40);
})();

/* ── HELPERS ────────────────────────────────────────────────── */
function setRow(id, pass, label){
  const row = document.getElementById('row-'+id);
  const st  = document.getElementById('st-'+id);
  row.className = 'check-row ' + (pass ? 'pass' : 'fail');
  st.textContent = label || (pass ? 'PASS' : 'FAIL');
}

/* ── 1. JAVASCRIPT ──────────────────────────────────────────── */
setRow('js', true, 'PASS');

/* ── 2. FIRST-PARTY COOKIES ─────────────────────────────────── */
(function(){
  const ok = navigator.cookieEnabled;
  if(ok){
    document.cookie = 'diag_test=1; SameSite=Lax; path=/';
    const has = document.cookie.includes('diag_test');
    setRow('cookie', has, has ? 'PASS' : 'BLOCKED');
  } else {
    setRow('cookie', false, 'DISABLED');
  }
})();

/* ── 3. THIRD-PARTY COOKIES ─────────────────────────────────── */
(function(){
  // Strategy: load a tiny iframe from a cross-origin and postMessage the result
  // We embed a blob that tries to set + read a cookie, but since blob: is opaque
  // for 3P checking, we instead use the Storage Access API as the signal.
  // Additionally we try a fetch to httpbin with credentials.
  
  let resolved = false;

  // Method A: Storage Access API (Chrome 119+)
  if(document.hasStorageAccess){
    document.hasStorageAccess().then(has => {
      // Top-level document always has storage access.
      // Use requestStorageAccessFor if available (Chrome 122+).
    });
  }

  // Method B: iframe postMessage trick using a null-origin blob
  const html = `<script>
    try {
      document.cookie = "tptest=1; SameSite=None; Secure; path=/";
      const has = document.cookie.indexOf("tptest") !== -1;
      parent.postMessage({tpCookies: has}, "*");
    } catch(e){
      parent.postMessage({tpCookies: false}, "*");
    }
  <\/script>`;

  const blob = new Blob([html], {type:'text/html'});
  const url  = URL.createObjectURL(blob);
  const frame = document.createElement('iframe');
  frame.style.display = 'none';
  frame.src = url;
  document.body.appendChild(frame);

  window.addEventListener('message', function handler(e){
    if(e.data && typeof e.data.tpCookies !== 'undefined'){
      resolved = true;
      window.removeEventListener('message', handler);
      frame.remove();
      URL.revokeObjectURL(url);
      setRow('3p', e.data.tpCookies,
        e.data.tpCookies ? 'PASS' : 'BLOCKED');
    }
  });

  // Fallback timeout: if iframe doesn't respond, assume blocked
  setTimeout(()=>{
    if(!resolved){
      resolved = true;
      frame.remove();
      URL.revokeObjectURL(url);
      // Check Chrome Privacy Sandbox flag heuristic
      const blocked = !navigator.cookieEnabled ||
        (window.chrome && window.chrome.privacy !== undefined);
      setRow('3p', false, 'UNDETECTABLE');
    }
  }, 2000);
})();

/* ── 4. HTTP CONNECTION ─────────────────────────────────────── */
(function(){
  const endpoint = 'http://neverssl.com/'; // Plain HTTP endpoint
  fetch(endpoint, {
    method: 'HEAD',
    mode: 'no-cors',
    cache: 'no-store',
    signal: AbortSignal.timeout(6000)
  })
  .then(() => {
    setRow('http', true, 'CONNECTED');
  })
  .catch(err => {
    // Mixed-content block → TypeError, network fail → TypeError too
    // Distinguish by message if possible
    const msg = err.message || '';
    const blocked = msg.includes('mixed') || msg.includes('insecure') ||
                    msg.includes('blocked') || msg.includes('Failed');
    setRow('http', false, blocked ? 'MIXED-CONTENT BLOCKED' : 'UNREACHABLE');
  });
})();

/* ── CAMERA ─────────────────────────────────────────────────── */
let currentStream = null;

async function startCamera(mode){
  if(currentStream) stopCamera();
  const wrap  = document.getElementById('video-wrap');
  const video = document.getElementById('video');
  const label = document.getElementById('cam-label');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: mode } },
      audio: false
    });
    currentStream = stream;
    video.srcObject = stream;
    wrap.style.display = 'block';
    label.textContent = mode === 'user' ? '● SELFIE' : '● BACK';
  } catch(e){
    alert('Camera error: ' + e.message);
  }
}

function stopCamera(){
  if(currentStream){
    currentStream.getTracks().forEach(t => t.stop());
    currentStream = null;
  }
  const wrap = document.getElementById('video-wrap');
  const video = document.getElementById('video');
  video.srcObject = null;
  wrap.style.display = 'none';
}

/* ── FILE UPLOAD / DOWNLOAD ─────────────────────────────────── */
let uploadedFile = null;
let uploadedURL  = null;

function onFileChosen(e){
  const file = e.target.files[0];
  if(!file) return;
  uploadedFile = file;
  if(uploadedURL) URL.revokeObjectURL(uploadedURL);
  uploadedURL = URL.createObjectURL(file);

  const info = document.getElementById('file-info');
  const dlBtn = document.getElementById('dl-btn');

  const kb = (file.size / 1024).toFixed(1);
  info.innerHTML = `<div class="fname">${escHtml(file.name)}</div>` +
    `<div>${file.type || 'unknown type'} · ${kb} KB</div>` +
    `<div style="color:var(--pass);margin-top:4px">✓ Ready for download</div>`;
  info.classList.add('visible');

  dlBtn.disabled = false;
  dlBtn.style.opacity = '1';
}

function downloadFile(){
  if(!uploadedURL || !uploadedFile) return;
  const a = document.createElement('a');
  a.href = uploadedURL;
  a.download = uploadedFile.name;
  a.click();
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── GOOGLE SIGN-IN ─────────────────────────────────────────── */
function triggerGoogle(){
  if(typeof google === 'undefined' || !google.accounts){
    // GSI not loaded yet or CLIENT_ID not set — show OAuth URL
    const note = document.getElementById('g-result');
    note.innerHTML = `<div style="color:var(--pending)">⚠ Configure a real Google Client ID in the HTML to enable sign-in.<br>
    <span style="color:var(--muted);font-size:10px">Replace YOUR_GOOGLE_CLIENT_ID in the &lt;div id="g_id_onload"&gt; tag.</span></div>`;
    note.classList.add('visible');
    return;
  }
  google.accounts.id.initialize({
    client_id: document.getElementById('g_id_onload').dataset.clientId,
    callback: onGoogleSignIn
  });
  google.accounts.id.prompt();
}

function onGoogleSignIn(response){
  const payload = parseJwt(response.credential);
  if(!payload) return;
  const result = document.getElementById('g-result');
  result.innerHTML =
    `<div class="gname">✓ ${escHtml(payload.name)}</div>` +
    `<div style="color:var(--muted)">${escHtml(payload.email)}</div>`;
  result.classList.add('visible');
}

function parseJwt(token){
  try {
    return JSON.parse(atob(token.split('.')[1]
      .replace(/-/g,'+').replace(/_/g,'/')));
  } catch(e){ return null; }
}
</script>
</body>
</html>
